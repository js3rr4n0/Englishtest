.tab:hover{border-color:rgba(247,243,236,.5)}
.tab.active{background:var(--paper);color:var(--ink);border-color:var(--paper)}
.tab.active .t-nm{color:var(--red)}
.stage{flex:1 1 auto;position:relative;background:var(--paper)}
.frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:var(--paper)}
.frame.active{display:block}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--gray);font-size:12px;background:var(--paper)}

<script>
function b64ToUtf8(b64){ const bin=atob(b64.trim()); const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0)); return new TextDecoder('utf-8').decode(bytes); }
const fg=document.getElementById('frame-guide');
const fw=document.getElementById('frame-words');
const fe=document.getElementById('frame-exam');
fg.addEventListener('load',()=>{const l=document.getElementById('loading'); if(l) l.style.display='none';},{once:true});
fg.srcdoc=b64ToUtf8(document.getElementById('b64-guide').textContent);
fw.srcdoc=b64ToUtf8(document.getElementById('b64-words').textContent);
fe.srcdoc=b64ToUtf8(document.getElementById('b64-exam').textContent);

function activate(target){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.target===target));
  document.querySelectorAll('.frame').forEach(f=>f.classList.toggle('active', f.id===target));
}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>activate(btn.dataset.target)));

// Enrutador: la Guía pide saltar a una palabra -> activar Palabras y filtrar
window.addEventListener('message',function(ev){
  const d=ev.data||{};
  if(d.type==='gotoWords'){
    activate('frame-words');
    if(fw && fw.contentWindow) fw.contentWindow.postMessage({type:'applyFilter', word:d.word}, '*');
  }
});
</script>
</body>
</html>
