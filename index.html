            margin-bottom: 20px;
        }

            background: #fff;
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-label:hover {
            background: #f1f2f6;
        }
        .option-label input {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-left: 4px solid var(--secondary);
            background-color: #f1f8ff;
            font-size: 0.95em;
            color: #2c3e50;
            border-radius: 0 6px 6px 0;
        }
        .btn {
            display: inline-block;
            background: var(--secondary);
            color: #fff;
            padding: 12px 25px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        .correct-opt {
            background-color: var(--success) !important;
            border-color: var(--success-border) !important;
            color: var(--success-text);
            font-weight: bold;
        }
        .incorrect-opt {
            background-color: var(--error) !important;
            border-color: var(--error-border) !important;
            color: var(--error-text);
        }
        .score-display {
            display: none;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            border-radius: 6px;
            background-color: #e8f8f5;
            color: #27ae60;
        }

</head>

    let currentTopicIndex = 0;
    
    function renderQuiz() {
        const container = document.getElementById("quiz-container");
        const topicData = quizData[currentTopicIndex];
        
        document.getElementById("progress").innerText = `Tema ${currentTopicIndex + 1} de ${quizData.length} — ${topicData.tema.replace('Tema '+(currentTopicIndex+1)+': ', '')}`;
        
        let html = `<h2>${topicData.tema}</h2>`;
        
        topicData.preguntas.forEach((p, qIndex) => {
            html += `<div class="question-block" id="qblock-${qIndex}">`;
            html += `<div class="question-text">${qIndex + 1}. ${p.q}</div>`;
            html += `<div class="options">`;
            
            p.o.forEach((optText, optIndex) => {
                html += `
                    <label class="option-label" id="label-q${qIndex}-o${optIndex}">
                        <input type="radio" name="q${qIndex}" value="${optIndex}">
                        ${optText}
                    </label>
                `;
            });
            
            html += `</div>`;
            html += `<div class="explanation" id="exp-q${qIndex}"><strong>Explicación:</strong> ${p.e}</div>`;
            html += `</div>`;
        });
        
        container.innerHTML = html;
        document.getElementById("btn-evaluar").style.display = "inline-block";
        document.getElementById("btn-evaluar").disabled = false;
        document.getElementById("btn-siguiente").style.display = "none";
        document.getElementById("score-display").style.display = "none";
        window.scrollTo(0,0);
    }

    function evaluarTema() {
        const topicData = quizData[currentTopicIndex];
        let correctCount = 0;
        let allAnswered = true;

        // Verificar si todas están respondidas (opcional, pero buena práctica)
        for (let i = 0; i < topicData.preguntas.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                allAnswered = false;
                break;
            }
        }
        
        if(!allAnswered) {
            alert("Por favor, selecciona una respuesta para todas las preguntas antes de evaluar.");
            return;
        }

        // Evaluar
        topicData.preguntas.forEach((p, qIndex) => {
            const selectedOpt = document.querySelector(`input[name="q${qIndex}"]:checked`);
            const selectedVal = selectedOpt ? parseInt(selectedOpt.value) : -1;
            
            // Marcar respuestas visualmente
            p.o.forEach((_, optIndex) => {
                const label = document.getElementById(`label-q${qIndex}-o${optIndex}`);
                const radio = label.querySelector('input');
                radio.disabled = true; // Desactivar
                
                if (optIndex === p.a) {
                    label.classList.add("correct-opt");
                } else if (optIndex === selectedVal && selectedVal !== p.a) {
                    label.classList.add("incorrect-opt");
                }
            });
            
            if (selectedVal === p.a) {
                correctCount++;
            }
            
            // Mostrar explicación
            document.getElementById(`exp-q${qIndex}`).style.display = "block";
        });

        // Mostrar puntuación
        const scoreEl = document.getElementById("score-display");
        scoreEl.innerText = `Obtuviste ${correctCount} de ${topicData.preguntas.length} respuestas correctas.`;
        scoreEl.style.display = "block";

        document.getElementById("btn-evaluar").style.display = "none";
        
        const nextBtn = document.getElementById("btn-siguiente");
        nextBtn.style.display = "inline-block";
        if(currentTopicIndex === quizData.length - 1) {
            nextBtn.innerText = "Finalizar Cuestionario";
        } else {
            nextBtn.innerText = "Siguiente Tema";
        }
    }

    function siguienteTema() {
        if (currentTopicIndex < quizData.length - 1) {
            currentTopicIndex++;
            renderQuiz();
        } else {
            document.getElementById("quiz-container").innerHTML = `<h2>¡Cuestionario Finalizado!</h2><p style="text-align:center;">Has completado el repaso de todos los ámbitos del obrar humano. ¡Felicidades!</p>`;
            document.getElementById("score-display").style.display = "none";
            document.getElementById("btn-siguiente").style.display = "none";
            document.getElementById("progress").style.display = "none";
        }
    }

    // Iniciar renderizado
    renderQuiz();
</script>
